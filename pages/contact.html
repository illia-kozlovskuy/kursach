<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зв'язатися з нами - SpikePoint</title>
    <link rel="stylesheet" href="../css/fonts.css" type="text/css">
    <link rel="stylesheet" href="../css/pages_css/contact.css" type="text/css">
    <link rel="stylesheet" href="../css/components.css" type="text/css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="../index.html"><img src="../images/svg/logo.svg" alt="logo"></a>
        </div>
        <nav>
            <a class="logo_a" href="../pages/club_rules.html">Правила клубу</a>
            <a class="logo_a" href="../pages/game_rules.html">Правила гри</a>
            <a class="logo_a" href="../pages/about_us.html">Про клуб</a>
            <a class="logo_a" href="../pages/gallery.html">Галерея</a>
            <a class="logo_a" href="../pages/quiz.html">Вікторина</a>
        </nav>
        <div class="header-controls">
            <button id="theme-toggle" class="theme-toggle" aria-label="Перемикач теми">☀️</button>
            <button class="burger" id="burger-btn" aria-label="Меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>
    <main>
        <div class="contact-container animate-on-scroll">
            <h1>Зв'язатися з нами</h1>
            <p class="subtitle">Маєте запитання або хочете приєднатися? Напишіть нам!</p>
            
            <form id="contact-form" novalidate>
                <div class="form-control">
                    <label for="name">Ваше ім'я</label>
                    <input type="text" id="name" placeholder="Введіть ім'я">
                    <span class="error-msg"></span>
                </div>
                
                <div class="form-control">
                    <label for="email">Ваш Email</label>
                    <input type="email" id="email" placeholder="example@email.com">
                    <span class="error-msg"></span>
                </div>
                
                <div class="form-control">
                    <label for="phone">Номер телефону (необов'язково)</label>
                    <input type="tel" id="phone" placeholder="+380XXXXXXXXX">
                    <span class="error-msg"></span>
                </div>
                
                <div class="form-control">
                    <label for="message">Повідомлення</label>
                    <textarea id="message" placeholder="Ваше повідомлення..."></textarea>
                    <span class="error-msg"></span>
                </div>
                
                <button type="submit">Відправити</button>
            </form>
        </div>
    </main>

    <footer>
        <img src="../images/svg/logo.svg" alt="logo">
        <li>
            <ul><a class="logo_a" href="../pages/club_rules.html">Правила клубу</a></ul>
            <ul><a class="logo_a" href="../pages/game_rules.html">Правила гри</a></ul>
            <ul><a class="logo_a" href="../pages/about_us.html">Про клуб</a></ul>
            <ul><a class="logo_a" href="../pages/gallery.html">Галерея</a></ul>
            <ul><a class="logo_a" href="../pages/quiz.html">Вікторина</a></ul>
        </li>
        <p>©   SpikePoint</p>
    </footer>
    <button id="scroll-top-btn" class="scroll-top-btn" aria-label="Вгору">↑</button>
    <script src="../js/main.js"></script>
    <script src="../js/form.js"></script>
</body>
</html>
